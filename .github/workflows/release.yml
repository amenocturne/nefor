name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create + release (e.g. v0.1.3). Will be created at the workflow's checked-out ref."
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    outputs:
      sha256: ${{ steps.bundle.outputs.sha256 }}
      tag:    ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ]; then
            echo "could not resolve a tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: Create + push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: cargo build release
        run: cargo build --release --workspace --locked --target aarch64-apple-darwin

      - name: bundle tarball
        id: bundle
        run: |
          set -euo pipefail
          DIST=nefor-aarch64-apple-darwin
          TARGET_BIN=target/aarch64-apple-darwin/release

          mkdir -p "$DIST/bin" "$DIST/share/nefor/plugins" "$DIST/share/nefor/starter"

          cp "$TARGET_BIN/nefor" "$DIST/bin/nefor"

          for p in basic-tools generic-provider generic-tool mock-plugin \
                   nefor-combinators nefor-tui openai-provider \
                   reasoner-graph tool-gate; do
            cp "$TARGET_BIN/$p" "$DIST/share/nefor/plugins/$p"
          done

          cp starter/*.lua "$DIST/share/nefor/starter/"
          cp LICENSE README.md CHANGELOG.md "$DIST/share/nefor/"

          tar -czf "$DIST.tar.gz" "$DIST"
          SHA256=$(shasum -a 256 "$DIST.tar.gz" | awk '{print $1}')
          printf '%s  %s\n' "$SHA256" "$DIST.tar.gz" > "$DIST.tar.gz.sha256"

          echo "tarball=$DIST.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256_file=$DIST.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: gh release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            ${{ steps.bundle.outputs.tarball }}
            ${{ steps.bundle.outputs.sha256_file }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: amenocturne/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}

      - name: Update Formula/nefor.rb
        env:
          SHA256: ${{ needs.release.outputs.sha256 }}
          TAG:    ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          URL="https://github.com/amenocturne/nefor/releases/download/${TAG}/nefor-aarch64-apple-darwin.tar.gz"
          sed -i "s|^  url \".*\"|  url \"$URL\"|"       Formula/nefor.rb
          sed -i "s|^  sha256 \".*\"|  sha256 \"$SHA256\"|" Formula/nefor.rb
          sed -i "s|^  version \".*\"|  version \"$VERSION\"|" Formula/nefor.rb

      - name: Commit + push
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Formula/nefor.rb; then
            echo "No formula changes; skipping commit."
            exit 0
          fi
          git commit -am "Bump nefor to ${TAG}"
          git push
