# Behavioral Reminders Configuration
#
# Each reminder has:
#   trigger: detection rule (type + threshold)
#   message: text sent via sendMessage
#   cooldown: minimum tool calls between repeated fires
#   max_per_session: hard cap on total fires per session

reminders:
  write_after_plan_only:
    trigger:
      type: write_when_plan_mode
      tools: [write, edit]
    message: >
      STOP. The user asked for a plan only. Do not modify files.
      Propose changes in text and wait for approval.
    cooldown: 1
    max_per_session: 5

  verbose_output:
    trigger:
      type: long_response
      threshold: 2000
    message: >
      Keep in mind human working memory holds 4-7 items. Give an overview and discuss one thing at a time.
    cooldown: 5
    max_per_session: 3

  premature_summary:
    trigger:
      type: tasks_still_running
    message: >
      Background tasks are still running. Wait for all completion
      messages before summarizing results.
    cooldown: 3
    max_per_session: 5

  # multi_tool_attempt: disabled — parallel tool calls are allowed
  # multi_tool_attempt:
  #   trigger:
  #     type: multi_tool_per_turn
  #     threshold: 2
  #   message: >
  #     Call tools one at a time in sequence. Wait for each result before the next.
  #   cooldown: 1
  #   max_per_session: 10
